<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/login.css">
</head>
<body class="min-h-screen flex items-center justify-center px-4">

<div class="login-card w-full max-w-md bg-stone-950/60 border border-slate-700 rounded-2xl shadow-2xl p-8">

    <div class="flex flex-col items-center mb-6">
        <div class="w-14 h-14 rounded-xl bg-amber-800 flex items-center justify-center mb-3">
            <span class="text-2xl font-bold text-white">M</span>
        </div>
        <h1 class="text-2xl font-semibold text-white">Bienvenido de nuevo</h1>
        <p class="text-slate-400 text-sm mt-1">Ingresa tus datos para acceder al sistema</p>
    </div>

    <form id="formLogin" novalidate>

        <div class="mb-4">
            <label for="correo" class="block text-sm font-medium text-slate-300 mb-1">Correo electrónico</label>
            <input
                type="text"
                id="correo"
                name="correo"
                placeholder="usuario@correo.com"
                class="w-full rounded-lg bg-stone-900 border border-slate-600 text-white px-4 py-2.5 outline-none focus:border-amber-950 focus:ring-1 focus:ring-orange-200"
            >
            <p id="errorCorreo" class="error-text text-red-400 text-xs mt-1">Ingresa un correo válido</p>
        </div>

        <div class="mb-2">
            <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Contraseña</label>
            <div class="relative">
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="********"
                    class="w-full rounded-lg bg-stone-900 border border-slate-600 text-white px-4 py-2.5 pr-11 outline-none focus:border-amber-950 focus:ring-1 focus:ring-orange-200"
                >
                <button
                    type="button"
                    id="botonVerPassword"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200"
                    aria-label="Mostrar contraseña"
                >
                    <svg id="iconoOjoAbierto" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <svg id="iconoOjoCerrado" class="hidden h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-2.929m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.243 4.243M9.878 9.878L3 3m6.878 6.878L21 21" />
                    </svg>
                </button>
            </div>
            <p id="errorPassword" class="error-text text-red-400 text-xs mt-1">
                Debe tener 8+ caracteres, mayúscula, minúscula, número y símbolo
            </p>
        </div>

        <p id="errorLogin" class="error-text text-red-400 text-sm mt-2 text-center"></p>

        <button
            type="submit"
            class="w-full mt-5 bg-amber-800 hover:bg-lime-800 transition-colors text-white font-medium py-2.5 rounded-lg"
        >
            Iniciar sesión
        </button>

    </form>

</div>

<script src="js/utileria.js"></script>
<script src="js/login.js"></script>
</body>
</html>
